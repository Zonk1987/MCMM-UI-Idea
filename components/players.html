<section
  class="tab-panel"
  id="panel-players"
  role="tabpanel"
  aria-labelledby="tab-players"
  x-data="playersApp()"
>
  <div class="panel-header">
    <div class="panel-title-group">
      <h1 x-text="$store.i18n.t('pl.title')">Player Manager</h1>
      <p class="panel-subtitle" x-text="$store.i18n.t('pl.subtitle')">
        Spieler verwalten, bannen, kicken und Whitelist pflegen
      </p>
    </div>
    <div class="panel-actions">
      <div
        class="custom-select-wrap"
        :class="{ 'open': selectorOpen }"
        @click.away="selectorOpen = false"
      >
        <button
          type="button"
          class="custom-select-trigger"
          @click="selectorOpen = !selectorOpen"
          :aria-expanded="selectorOpen"
        >
          <span class="material-icons-round">dns</span>
          <span class="custom-select-label" x-text="serverLabel"></span>
          <span class="material-icons-round custom-select-arrow">expand_more</span>
        </button>
        <ul class="custom-select-dropdown" x-show="selectorOpen" x-transition.opacity>
          <li
            class="custom-select-option"
            @click="state.server = ''; selectorOpen = false"
            :class="{'active': state.server === ''}"
          >
            <span class="cso-dot" style="background: var(--text-muted)"></span>
            <span x-text="$store.i18n.t('general.server_selector_default')">Kein Server</span>
          </li>
          <template x-for="s in servers" :key="s.containerId">
            <li
              class="custom-select-option"
              @click="state.server = s.containerId; selectorOpen = false"
              :class="{'active': state.server === s.containerId}"
            >
              <span
                class="cso-dot"
                :style="{ background: s.status === 'online' ? 'var(--green)' : 'var(--red)' }"
              ></span>
              <span x-text="s.serverName"></span>
              <span
                class="cso-status"
                x-text="s.status === 'online' ? ($store.i18n.t('general.online') || 'Online') : ($store.i18n.t('general.offline') || 'Offline')"
              ></span>
            </li>
          </template>
        </ul>
      </div>
    </div>
  </div>

  <div class="player-layout">
    <!-- Sub-Tabs -->
    <div class="player-subtabs">
      <button
        type="button"
        class="subtab-btn"
        :class="{ 'active': state.subtab === 'online' }"
        @click="state.subtab = 'online'"
      >
        <span class="material-icons-round">sensors</span>
        <span x-text="$store.i18n.t('tab.online')">Online</span>
        <span class="tab-badge online" x-text="onlineCount"></span>
      </button>
      <button
        type="button"
        class="subtab-btn"
        :class="{ 'active': state.subtab === 'whitelist' }"
        @click="state.subtab = 'whitelist'"
      >
        <span class="material-icons-round">playlist_add_check</span>
        <span x-text="$store.i18n.t('tab.whitelist')">Whitelist</span>
      </button>
      <button
        type="button"
        class="subtab-btn"
        :class="{ 'active': state.subtab === 'bans' }"
        @click="state.subtab = 'bans'"
      >
        <span class="material-icons-round">gavel</span>
        <span x-text="$store.i18n.t('tab.bans')">Bans</span>
      </button>
      <button
        type="button"
        class="subtab-btn"
        :class="{ 'active': state.subtab === 'chatlog' }"
        @click="state.subtab = 'chatlog'"
      >
        <span class="material-icons-round">chat</span>
        <span x-text="$store.i18n.t('tab.chatlog')">Chat Log</span>
      </button>
    </div>

    <!-- Player Content -->
    <div class="player-content">
      <!-- Empty states -->
      <template x-if="!state.server">
        <div class="empty-state">
          <span class="material-icons-round">dns</span>
          <p x-text="$store.i18n.t('general.no_server_selected')">
            Wähle einen Server aus um Spielerdaten zu sehen.
          </p>
        </div>
      </template>
      <template x-if="state.server && !activeData">
        <div class="empty-state">
          <span class="material-icons-round">error</span>
          <p x-text="$store.i18n.t('general.no_server_data')">
            Keine Daten für diesen Server verfügbar.
          </p>
        </div>
      </template>

      <!-- Online Tab -->
      <template x-if="activeData && state.subtab === 'online'">
        <div>
          <template x-if="!activeData.online.length">
            <div class="empty-state">
              <span class="material-icons-round">person_off</span>
              <p x-text="$store.i18n.t('general.no_players_online')">Keine Spieler online.</p>
            </div>
          </template>
          <template x-if="activeData.online.length > 0">
            <div class="player-table-wrapper">
              <table class="player-table">
                <thead>
                  <tr>
                    <th style="width: 40px"></th>
                    <th x-text="$store.i18n.t('col.player')">Spieler</th>
                    <th x-text="$store.i18n.t('col.ping')">Ping</th>
                    <th x-text="$store.i18n.t('col.playtime')">Spielzeit</th>
                    <th x-text="$store.i18n.t('col.gamemode')">Gamemode</th>
                    <th x-text="$store.i18n.t('col.rank')">Rang</th>
                    <th x-text="$store.i18n.t('col.actions')">Aktionen</th>
                  </tr>
                </thead>
                <tbody x-init="typeof autoAnimate !== 'undefined' ? autoAnimate($el) : null">
                  <template x-for="p in activeData.online" :key="p.name">
                    <tr>
                      <td>
                        <img
                          loading="lazy"
                          decoding="async"
                          src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
                          class="player-avatar"
                          :src="'https://mc-heads.net/avatar/' + p.name + '/32'"
                          @error="playerAvatarError($el)"
                          alt="Avatar"
                        />
                      </td>
                      <td>
                        <div class="player-name" x-text="p.name"></div>
                        <div class="player-uuid" x-text="p.uuid"></div>
                      </td>
                      <td>
                        <span
                          class="player-ping"
                          :class="pingClass(p.ping)"
                          x-text="p.ping + 'ms'"
                        ></span>
                      </td>
                      <td
                        style="color: var(--text-secondary); font-size: 13px"
                        x-text="p.playtime"
                      ></td>
                      <td>
                        <button
                          type="button"
                          aria-label="Toggle Gamemode"
                          class="gamemode-badge"
                          :class="'gm-' + (p.gamemode || 'survival')"
                          @click="toggleGamemode(p.name)"
                          title="Gamemode wechseln"
                          x-text="getGmLabel(p.gamemode)"
                        ></button>
                      </td>
                      <td>
                        <template x-if="p.isOp"
                          ><span
                            class="mc-tag forge"
                            style="font-size: 10px"
                            x-text="$store.i18n.t('general.rank_op')"
                            >OP</span
                          ></template
                        >
                        <template x-if="!p.isOp"
                          ><span class="mc-tag" x-text="$store.i18n.t('general.rank_player')"
                            >Spieler</span
                          ></template
                        >
                      </td>
                      <td>
                        <div class="player-actions">
                          <button
                            type="button"
                            class="btn btn-ghost"
                            style="padding: 4px 10px; font-size: 11px"
                            @click="msgPlayer(p.name)"
                            :title="$store.i18n.t('general.tooltip_msg')"
                          >
                            <span class="material-icons-round" style="font-size: 14px">chat</span>
                          </button>
                          <button
                            type="button"
                            class="btn btn-ghost"
                            style="padding: 4px 10px; font-size: 11px"
                            @click="tpPlayer(p.name)"
                            :title="$store.i18n.t('general.tooltip_tp')"
                          >
                            <span class="material-icons-round" style="font-size: 14px"
                              >near_me</span
                            >
                          </button>
                          <template x-if="!p.isOp">
                            <button
                              type="button"
                              class="btn btn-ghost"
                              style="padding: 4px 10px; font-size: 11px"
                              @click="opPlayer(p.name)"
                              :title="$store.i18n.t('general.tooltip_op')"
                            >
                              <span class="material-icons-round" style="font-size: 14px"
                                >admin_panel_settings</span
                              >
                            </button>
                          </template>
                          <button
                            type="button"
                            class="btn btn-ghost"
                            style="padding: 4px 10px; font-size: 11px; color: var(--yellow)"
                            @click="kickPlayer(p.name)"
                            :title="$store.i18n.t('general.tooltip_kick')"
                          >
                            <span class="material-icons-round" style="font-size: 14px">logout</span>
                          </button>
                          <button
                            type="button"
                            class="btn btn-danger"
                            style="padding: 4px 10px; font-size: 11px"
                            @click="openBanModal(p.name)"
                            :title="$store.i18n.t('general.tooltip_ban')"
                          >
                            <span class="material-icons-round" style="font-size: 14px">gavel</span>
                          </button>
                        </div>
                      </td>
                    </tr>
                  </template>
                </tbody>
              </table>
            </div>
          </template>
        </div>
      </template>

      <!-- Whitelist Tab -->
      <template x-if="activeData && state.subtab === 'whitelist'">
        <div
          class="player-table-wrapper"
          x-init="typeof autoAnimate !== 'undefined' ? autoAnimate($el) : null"
        >
          <div
            style="
              padding: 14px 16px;
              border-bottom: 1px solid var(--border);
              display: flex;
              justify-content: space-between;
              align-items: center;
            "
          >
            <span
              style="font-size: 13px; color: var(--text-secondary)"
              x-text="activeData.whitelist.length + ' ' + ($store.i18n.t('general.whitelist_players') || 'Spieler auf der Whitelist')"
            ></span>
            <button
              type="button"
              class="btn btn-primary"
              style="padding: 6px 14px; font-size: 12px"
              @click="addWhitelist()"
            >
              <span class="material-icons-round">person_add</span>
              <span x-text="$store.i18n.t('btn.add')">Hinzufügen</span>
            </button>
          </div>
          <template x-for="p in activeData.whitelist" :key="p.name">
            <div class="list-entry">
              <img
                loading="lazy"
                decoding="async"
                src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
                class="player-avatar"
                :src="'https://mc-heads.net/avatar/' + p.name + '/32'"
                @error="playerAvatarError($el)"
                alt="Avatar"
              />
              <div class="list-entry-name" x-text="p.name"></div>
              <div class="list-entry-meta" x-text="p.uuid"></div>
              <button
                type="button"
                class="btn btn-danger"
                style="padding: 5px 12px; font-size: 11px"
                @click="removeWhitelist(p.name)"
              >
                <span class="material-icons-round" style="font-size: 13px">remove</span>
                <span x-text="$store.i18n.t('btn.remove')">Entfernen</span>
              </button>
            </div>
          </template>
          <template x-if="!activeData.whitelist.length">
            <div class="empty-state" style="padding: 40px">
              <span class="material-icons-round">playlist_add_check</span>
              <p x-text="$store.i18n.t('general.whitelist_empty')">Whitelist ist leer.</p>
            </div>
          </template>
        </div>
      </template>

      <!-- Bans Tab -->
      <template x-if="activeData && state.subtab === 'bans'">
        <div
          class="player-table-wrapper"
          x-init="typeof autoAnimate !== 'undefined' ? autoAnimate($el) : null"
        >
          <div style="padding: 14px 16px; border-bottom: 1px solid var(--border)">
            <span
              style="font-size: 13px; color: var(--text-secondary)"
              x-text="activeData.bans.length + ' ' + ($store.i18n.t('general.active_bans') || 'aktive Bans')"
            ></span>
          </div>
          <template x-for="b in activeData.bans" :key="b.name">
            <div class="list-entry">
              <div class="player-avatar-placeholder">🔨</div>
              <div style="flex: 1">
                <div class="list-entry-name" style="color: var(--red)" x-text="b.name"></div>
                <div
                  class="list-entry-meta"
                  x-text="($store.i18n.t('general.ban_reason_prefix') || 'Grund: ') + b.reason + ' · ' + b.date + ' · ' + b.duration"
                ></div>
              </div>
              <button
                type="button"
                class="btn btn-ghost"
                style="padding: 5px 12px; font-size: 11px"
                @click="unbanPlayer(b.name)"
              >
                <span class="material-icons-round" style="font-size: 13px">undo</span>
                <span x-text="$store.i18n.t('btn.unban')">Entbannen</span>
              </button>
            </div>
          </template>
          <template x-if="!activeData.bans.length">
            <div class="empty-state">
              <span class="material-icons-round">gavel</span>
              <p x-text="$store.i18n.t('general.bans_empty')">Keine aktiven Bans.</p>
            </div>
          </template>
        </div>
      </template>

      <!-- Chat Log Tab -->
      <template x-if="activeData && state.subtab === 'chatlog'">
        <div
          class="chat-log-wrapper"
          style="display: flex; flex-direction: column; height: 100%; min-height: 400px"
        >
          <div
            class="chat-container"
            x-init="typeof autoAnimate !== 'undefined' ? autoAnimate($el) : null"
            style="
              flex: 1;
              overflow-y: auto;
              padding: 12px;
              border-radius: 8px;
              margin-bottom: 12px;
            "
          >
            <template x-for="c in activeData.chatlog">
              <div class="chat-msg">
                <span class="chat-msg-time" x-text="c.time"></span>
                <div style="display: flex; align-items: center; gap: 6px; margin-top: 1px">
                  <img
                    loading="lazy"
                    decoding="async"
                    src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="
                    :src="'https://mc-heads.net/avatar/' + c.player + '/16'"
                    style="
                      width: 16px;
                      height: 16px;
                      border-radius: 3px;
                      image-rendering: pixelated;
                    "
                    @error="$el.style.display = 'none'"
                    alt="Avatar"
                  />
                  <span
                    class="chat-msg-player"
                    :class="{'chat-op': isPlayerOp(c.player)}"
                    x-text="'<' + c.player + '>'"
                  ></span>
                </div>
                <span class="chat-msg-text" x-text="c.msg"></span>
              </div>
            </template>
            <template x-if="!activeData.chatlog.length">
              <div class="empty-state">
                <span class="material-icons-round">chat_bubble_outline</span>
                <p x-text="$store.i18n.t('general.chat_empty')">Keine Nachrichten.</p>
              </div>
            </template>
          </div>
          <div class="chat-input-area" style="display: flex; gap: 8px">
            <label
              for="chatInput"
              style="position: absolute; width: 1px; height: 1px; overflow: hidden"
              >Chat</label
            >
            <input
              type="text"
              id="chatInput"
              name="chatInput"
              x-model="state.chatInput"
              @keydown.enter="sendChat()"
              class="form-input"
              style="flex: 1; background: var(--bg-input)"
              :placeholder="$store.i18n.t('general.chat_placeholder')"
            />
            <button type="button" class="btn btn-primary" @click="sendChat()">
              <span class="material-icons-round">send</span>
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Ban Modal -->
  <div
    class="modal-backdrop"
    x-show="state.banTarget !== null"
    style="display: none"
    @click.self="state.banTarget = null"
  >
    <div class="modal glass-card">
      <div class="modal-header">
        <h2 x-text="$store.i18n.t('general.ban_modal_title')">Spieler bannen</h2>
        <button type="button" class="icon-btn" @click="state.banTarget = null">
          <span class="material-icons-round">close</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="banPlayer" x-text="$store.i18n.t('col.player')">Spieler</label>
          <input type="text" id="banPlayer" readonly class="form-input" :value="state.banTarget" />
        </div>
        <div class="form-group">
          <label for="banReason" x-text="$store.i18n.t('general.ban_reason_label')">Grund</label>
          <input
            type="text"
            id="banReason"
            x-model="state.banReason"
            :placeholder="$store.i18n.t('general.ban_reason_placeholder')"
            class="form-input"
          />
        </div>
        <div class="form-group">
          <label for="banDuration" x-text="$store.i18n.t('general.ban_duration_label')"
            >Dauer</label
          >
          <select id="banDuration" x-model="state.banDuration" class="filter-select">
            <option value="permanent" x-text="$store.i18n.t('general.duration_permanent')">
              Permanent
            </option>
            <option value="1d" x-text="$store.i18n.t('general.duration_1d')">1 Tag</option>
            <option value="7d" x-text="$store.i18n.t('general.duration_7d')">7 Tage</option>
            <option value="30d" x-text="$store.i18n.t('general.duration_30d')">30 Tage</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-ghost"
          @click="state.banTarget = null"
          x-text="$store.i18n.t('btn.cancel')"
        >
          Abbrechen
        </button>
        <button type="button" class="btn btn-danger" @click="confirmBan()">
          <span class="material-icons-round">gavel</span>
          <span x-text="$store.i18n.t('btn.ban')">Bannen</span>
        </button>
      </div>
    </div>
  </div>
</section>
