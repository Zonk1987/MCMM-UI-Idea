<section
  class="tab-panel active"
  id="panel-docker"
  role="tabpanel"
  aria-labelledby="tab-docker"
  x-data="dockerApp()"
>
  <div class="panel-header">
    <div class="panel-title-group">
      <h1 x-text="$store.i18n.t('general.docker_title')">Docker Hub</h1>
      <p class="panel-subtitle" x-text="$store.i18n.t('general.docker_subtitle')">
        Verwalte deine Docker Container, Updates und Systemauslastung
      </p>
    </div>
    <div class="panel-actions" style="display: flex; align-items: center; gap: 16px">
      <label
        style="display: flex; align-items: center; gap: 10px; cursor: pointer; white-space: nowrap"
        :title="$store.i18n.t('general.advanced_view')"
      >
        <span
          style="font-size: 12px; color: var(--text-secondary); font-weight: 600"
          x-text="$store.i18n.t('general.advanced_view')"
          >Advanced View</span
        >
        <div class="action-toggle">
          <input type="checkbox" x-model="advancedView" />
          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </label>
      <div class="search-box">
        <label
          for="dockerSearchInput"
          style="display: flex; align-items: center; cursor: text; margin: 0"
          ><span class="material-icons-round">search</span></label
        >
        <input
          type="text"
          id="dockerSearchInput"
          name="dockerSearch"
          x-model="searchQuery"
          :placeholder="$store.i18n.t('general.search_container')"
          aria-label="Container suchen"
        />
      </div>
    </div>
  </div>

  <div class="stats-row" id="dockerStats">
    <div class="stat-card">
      <span class="material-icons-round stat-icon running">play_circle</span>
      <div>
        <div class="stat-value" x-text="stats.running">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.running')">Läuft</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-icons-round stat-icon stopped">stop_circle</span>
      <div>
        <div class="stat-value" x-text="stats.stopped">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.stopped')">Gestoppt</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-icons-round stat-icon update">update</span>
      <div>
        <div class="stat-value" x-text="stats.updates">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.updates')">Updates</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-icons-round stat-icon total">grid_view</span>
      <div>
        <div class="stat-value" x-text="stats.total">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.total')">Gesamt</div>
      </div>
    </div>
  </div>

  <div class="docker-table-wrapper">
    <table class="docker-table" id="dockerTable">
      <thead>
        <tr>
          <th class="col-bulk" style="width: 40px; text-align: center">
            <input
              type="checkbox"
              style="cursor: pointer"
              x-model="selectAll"
              @change="toggleSelectAll()"
              aria-label="Alle auswählen"
            />
          </th>
          <th class="col-icon"></th>
          <th class="col-name sortable" @click="toggleSort('name')">
            <span x-text="$store.i18n.t('col.name')">Name</span>
            <span class="material-icons-round sort-icon">unfold_more</span>
          </th>
          <th class="col-status sortable" @click="toggleSort('status')">
            <span x-text="$store.i18n.t('col.status')">Status</span>
            <span class="material-icons-round sort-icon">unfold_more</span>
          </th>
          <th
            class="col-adv"
            x-show="advancedView"
            style="width: 80px; text-align: center"
            x-text="$store.i18n.t('col.autostart')"
          >
            Autostart
          </th>
          <th
            class="col-adv"
            x-show="advancedView"
            style="width: 180px"
            x-text="$store.i18n.t('col.cpu_ram')"
          >
            CPU / RAM
          </th>
          <th
            class="col-adv"
            x-show="advancedView"
            style="width: 160px"
            x-text="$store.i18n.t('col.uptime')"
          >
            Uptime
          </th>
          <th class="col-ports" x-text="$store.i18n.t('col.ports')">Ports</th>
          <th class="col-paths" x-text="$store.i18n.t('col.paths')">Pfade</th>
          <th class="col-actions" x-text="$store.i18n.t('col.actions')">Aktionen</th>
        </tr>
      </thead>
      <tbody x-init="typeof autoAnimate !== 'undefined' ? autoAnimate($el) : null">
        <template x-if="isLoading">
          <template x-for="i in 5">
            <tr>
              <td></td>
              <td>
                <div class="skeleton skeleton-avatar"></div>
              </td>
              <td>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 40%"></div>
              </td>
              <td>
                <div class="skeleton skeleton-btn"></div>
              </td>
              <td class="col-adv" x-show="advancedView"></td>
              <td class="col-adv" x-show="advancedView">
                <div class="skeleton skeleton-text" style="margin-bottom: 8px"></div>
                <div class="skeleton skeleton-text"></div>
              </td>
              <td class="col-adv" x-show="advancedView"></td>
              <td>
                <div class="skeleton skeleton-text" style="width: 80%"></div>
              </td>
              <td>
                <div class="skeleton skeleton-text" style="width: 90%"></div>
              </td>
              <td>
                <div style="display: flex; gap: 4px">
                  <div class="skeleton skeleton-btn" style="width: 40px"></div>
                  <div class="skeleton skeleton-btn" style="width: 32px"></div>
                </div>
              </td>
            </tr>
          </template>
        </template>

        <template x-if="!isLoading && filteredContainers.length === 0">
          <tr>
            <td colspan="10">
              <div class="empty-state">
                <span class="material-icons-round">inbox</span>
                <p x-text="$store.i18n.t('general.no_containers_found')">
                  Keine Container gefunden
                </p>
              </div>
            </td>
          </tr>
        </template>

        <template x-if="!isLoading">
          <template x-for="c in filteredContainers" :key="c.id">
            <tr :style="selected.includes(c.id) ? 'background: var(--bg-card-hover)' : ''">
              <td style="text-align: center">
                <input
                  type="checkbox"
                  style="cursor: pointer"
                  :value="c.id"
                  x-model="selected"
                  aria-label="Container auswählen"
                />
              </td>
              <td>
                <template x-if="c.icon">
                  <div class="container-icon-wrap">
                    <img
                      :src="c.icon"
                      :alt="c.name"
                      onerror="
                        this.parentElement.className = 'container-icon-fallback';
                        this.parentElement.innerHTML = 'x';
                      "
                    />
                  </div>
                </template>
                <template x-if="!c.icon">
                  <div class="container-icon-fallback" x-text="c.iconFallback"></div>
                </template>
              </td>
              <td>
                <div class="container-name" x-text="c.name"></div>
                <div class="container-image" x-text="c.image"></div>
              </td>
              <td>
                <div :class="'status-badge ' + c.status">
                  <span class="dot"></span>
                  <span x-text="c.status === 'running' ? 'Läuft' : 'Gestoppt'"></span>
                </div>
                <template x-if="!c.upToDate">
                  <div class="update-badge">Update verfügbar</div>
                </template>
              </td>
              <td
                class="col-adv"
                x-show="advancedView"
                style="text-align: center; vertical-align: middle"
              >
                <label class="action-toggle" style="margin: 0" title="Autostart">
                  <input type="checkbox" :checked="c.id==='nginx01' || c.id==='portainer01'" />
                  <div class="toggle-track">
                    <div class="toggle-thumb"></div>
                  </div>
                </label>
              </td>
              <td
                class="col-adv"
                x-show="advancedView"
                style="vertical-align: middle; padding-top: 8px; padding-bottom: 8px"
              >
                <div style="margin-bottom: 8px">
                  <div style="font-size: 11px; margin-bottom: 4px; color: var(--text-secondary)">
                    CPU:
                    <span
                      x-text="c.status === 'running' ? (Math.random() * 5).toFixed(1) + '%' : '0.0%'"
                    ></span>
                  </div>
                  <div
                    style="
                      height: 4px;
                      background: var(--bg-surface);
                      border-radius: 2px;
                      overflow: hidden;
                    "
                  >
                    <div
                      :style="`width:${c.status === 'running' ? Math.random()*20+5 : 0}%; background:var(--cyan); height:100%;`"
                    ></div>
                  </div>
                </div>
                <div>
                  <div style="font-size: 11px; margin-bottom: 4px; color: var(--text-secondary)">
                    RAM:
                    <span
                      x-text="c.status === 'running' ? Math.floor(Math.random() * 400 + 100) + ' MB' : '0 MB'"
                    ></span>
                  </div>
                  <div
                    style="
                      height: 4px;
                      background: var(--bg-surface);
                      border-radius: 2px;
                      overflow: hidden;
                    "
                  >
                    <div
                      :style="`width:${c.status === 'running' ? Math.random()*30+10 : 0}%; background:var(--purple); height:100%;`"
                    ></div>
                  </div>
                </div>
              </td>
              <td
                class="col-adv"
                x-show="advancedView"
                style="font-size: 12px; color: var(--text-secondary); line-height: 1.4"
              >
                <span
                  x-html="c.status === 'running' ? 'Uptime: 5 days (healthy)<br>Created: 14 days ago' : '—'"
                ></span>
              </td>
              <td>
                <div class="port-list">
                  <template x-for="p in c.ports">
                    <div class="port-item">
                      <span class="port-host" x-text="p.host"></span>
                      <span class="port-arrow">↔</span>
                      <span x-text="p.container"></span>
                      <span style="color: var(--text-muted)" x-text="` (${p.proto})`"></span>
                    </div>
                  </template>
                </div>
              </td>
              <td>
                <div class="path-list">
                  <template x-for="p in c.paths.slice(0, 3)">
                    <div class="path-item" :title="`${p.host} → ${p.container}`">
                      <span x-text="p.host"></span> <span class="path-arrow">→</span>
                      <span x-text="p.container"></span>
                    </div>
                  </template>
                  <template x-if="c.paths.length > 3">
                    <div
                      class="path-item"
                      style="color: var(--accent)"
                      x-text="`+${c.paths.length - 3} weitere`"
                    ></div>
                  </template>
                </div>
              </td>
              <td>
                <div class="row-actions">
                  <label
                    class="action-toggle"
                    :title="c.status === 'running' ? (t('btn.stop') || 'Stoppen') : (t('btn.start') || 'Starten')"
                  >
                    <input
                      type="checkbox"
                      :checked="c.status === 'running'"
                      @change="toggleContainer(c.id)"
                    />
                    <div class="toggle-track">
                      <div class="toggle-thumb"></div>
                    </div>
                  </label>
                  <button
                    class="action-btn"
                    :title="$store.i18n.t('general.tooltip_logs')"
                    @click="typeof openTerminal === 'function' ? openTerminal(c.id) : null"
                  >
                    <span class="material-icons-round">terminal</span>
                  </button>
                  <button
                    class="action-btn"
                    :title="$store.i18n.t('general.tooltip_settings')"
                    @click="$dispatch('open-config-modal', {id: c.id, name: c.name, port: (c.ports && c.ports[0]) ? c.ports[0].host : '', ram: 4096})"
                  >
                    <span class="material-icons-round">settings</span>
                  </button>
                  <template x-if="!c.upToDate">
                    <button
                      class="action-btn"
                      style="color: var(--yellow)"
                      :title="$store.i18n.t('general.tooltip_update')"
                      @click="updateContainer(c.id)"
                    >
                      <span class="material-icons-round">upgrade</span>
                    </button>
                  </template>
                </div>
              </td>
            </tr>
          </template>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Bulk Action Bar -->
  <div class="bulk-action-bar" :class="selected.length > 0 ? 'active' : ''">
    <div
      style="
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--text-primary);
        font-weight: 600;
      "
    >
      <span class="material-icons-round" style="color: var(--accent)">check_circle</span>
      <span x-text="`${selected.length} ausgewählt`"></span>
    </div>
    <div style="width: 1px; height: 24px; background: var(--border)"></div>
    <div style="display: flex; gap: 8px">
      <button class="btn btn-primary" @click="bulkAction('start')">
        <span class="material-icons-round">play_arrow</span> Starten
      </button>
      <button class="btn btn-ghost" @click="bulkAction('stop')">
        <span class="material-icons-round">stop</span> Stoppen
      </button>
      <button class="btn btn-danger" @click="bulkAction('delete')" style="margin-left: 8px">
        <span class="material-icons-round">delete</span> Löschen
      </button>
    </div>
  </div>
</section>
