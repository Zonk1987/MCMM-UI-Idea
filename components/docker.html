<section
  class="tab-panel active"
  id="panel-docker"
  role="tabpanel"
  aria-labelledby="tab-docker"
  x-data="dockerApp()"
>
  <div class="panel-header">
    <div class="panel-title-group">
      <h1 x-text="$store.i18n.t('general.docker_title')">Docker Hub</h1>
      <p class="panel-subtitle" x-text="$store.i18n.t('general.docker_subtitle')">
        Verwalte deine Docker Container, Updates und Systemauslastung
      </p>
    </div>
    <div class="panel-actions" style="display: flex; align-items: center; gap: 16px">
      <label
        style="display: flex; align-items: center; gap: 10px; cursor: pointer; white-space: nowrap"
        :title="$store.i18n.t('general.advanced_view')"
      >
        <span
          style="font-size: 12px; color: var(--text-secondary); font-weight: 600"
          x-text="$store.i18n.t('general.advanced_view')"
          >Advanced View</span
        >
        <div class="action-toggle">
          <input type="checkbox" x-model="advancedView" />
          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>
        </div>
      </label>
      <div class="search-box">
        <label
          for="dockerSearchInput"
          style="display: flex; align-items: center; cursor: text; margin: 0"
          ><span class="material-icons-round">search</span></label
        >
        <input
          type="text"
          id="dockerSearchInput"
          name="dockerSearch"
          x-model="searchQuery"
          :placeholder="$store.i18n.t('general.search_container')"
          aria-label="Container suchen"
        />
      </div>
      <button class="btn btn-secondary" style="height: 38px" x-show="folderViewEnabled" @click="createFolderPrompt()">
        <span class="material-icons-round">create_new_folder</span>
        Neuer Ordner
      </button>
    </div>
  </div>

  <div class="stats-row" id="dockerStats">
    <div class="stat-card">
      <span class="material-icons-round stat-icon running">play_circle</span>
      <div>
        <div class="stat-value" x-text="stats.running">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.running')">Läuft</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-icons-round stat-icon stopped">stop_circle</span>
      <div>
        <div class="stat-value" x-text="stats.stopped">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.stopped')">Gestoppt</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-icons-round stat-icon update">update</span>
      <div>
        <div class="stat-value" x-text="stats.updates">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.updates')">Updates</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-icons-round stat-icon running" style="color: var(--green);">favorite</span>
      <div>
        <div class="stat-value" x-text="stats.healthy">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.healthy') || 'Healthy'">Healthy</div>
      </div>
    </div>
    <div class="stat-card">
      <span class="material-icons-round stat-icon total">grid_view</span>
      <div>
        <div class="stat-value" x-text="stats.total">0</div>
        <div class="stat-label" x-text="$store.i18n.t('stat.total')">Gesamt</div>
      </div>
    </div>
  </div>

  <div class="docker-table-wrapper">
    <table class="docker-table" id="dockerTable">
      <thead x-show="hasRootContainers">
        <tr>
          <th class="col-bulk" style="width: 40px; text-align: center">
            <input
              type="checkbox"
              style="cursor: pointer"
              x-model="selectAll"
              @change="toggleSelectAll()"
              aria-label="Alle auswählen"
            />
          </th>
          <th class="col-icon"></th>
          <th class="col-name sortable" @click="toggleSort('name')">
            <span x-text="$store.i18n.t('col.name')">Name</span>
            <span class="material-icons-round sort-icon">unfold_more</span>
          </th>

          <th class="col-ports" x-text="$store.i18n.t('col.ports')">Ports</th>
          <th class="col-paths" x-text="$store.i18n.t('col.paths')">Pfade</th>
          <th
            class="col-adv"
            style="width: 1%; text-align: right; padding-right: 16px; white-space: nowrap;"
            x-text="$store.i18n.t('col.autostart')"
          >
            Autostart
          </th>
          <th
            class="col-adv"
            x-show="advancedView"
            style="width: 1%; text-align: center; white-space: nowrap;"
            x-text="$store.i18n.t('col.cpu_ram')"
          >
            CPU / RAM
          </th>
          <th
            class="col-adv"
            x-show="advancedView"
            style="width: 1%; text-align: center; white-space: nowrap;"
            x-text="$store.i18n.t('col.uptime')"
          >
            Uptime
          </th>
        </tr>
      </thead>
      <tbody>
        <template x-if="isLoading">
          <template x-for="i in 5">
            <tr>
              <td></td>
              <td>
                <div class="skeleton skeleton-avatar"></div>
              </td>
              <td>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text" style="width: 40%"></div>
              </td>

              <td>
                <div class="skeleton skeleton-text" style="width: 80%"></div>
              </td>
              <td>
                <div class="skeleton skeleton-text" style="width: 90%"></div>
              </td>
              <td class="col-adv"></td>
              <td class="col-adv" x-show="advancedView" style="text-align: right; padding-right: 16px;">
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 8px;">
                  <div class="skeleton skeleton-text" style="width: 100px;"></div>
                  <div class="skeleton skeleton-text" style="width: 100px;"></div>
                </div>
              </td>
              <td class="col-adv" x-show="advancedView"></td>
            </tr>
          </template>
        </template>

        <template x-if="!isLoading && filteredContainers.length === 0">
          <tr>
            <td colspan="9">
              <div class="empty-state">
                <span class="material-icons-round">inbox</span>
                <p x-text="$store.i18n.t('general.no_containers_found')">
                  Keine Container gefunden
                </p>
              </div>
            </td>
          </tr>
        </template>

        <template x-if="!isLoading">
          <template x-for="c in viewItems" :key="c.id">
            <tr
              style="border-bottom: 1px solid var(--border);"
              :class="{
                'folder-row': c.type === 'folder', 
                'sub-header-row': c.type === 'folder_header',
                'drag-over': (c.type === 'folder' && dragOverFolder === c.name) || (c.type === 'container' && !c.folder && dragOverRoot)
              }"
              x-show="c.type === 'folder' || (!c.folder || isFolderExpanded(c.folder))"
              :style="{
                'background': c.type === 'container' && selected.includes(c.id) ? 'var(--bg-card-hover)' : (c.type === 'folder_header' ? 'var(--bg-surface)' : ''),
                'cursor': c.type === 'container' ? 'grab' : 'default'
              }"
              :draggable="c.type === 'container' ? 'true' : 'false'"
              @dragstart="if(c.type === 'container') startDrag($event, c.id)"
              @dragend="if(c.type === 'container') endDrag($event)"
              @dragover.prevent="if(c.type === 'folder') handleDragOver($event, c.name); else if (c.type === 'container' && !c.folder) handleDragOver($event, null)"
              @dragleave="if(c.type === 'folder') handleDragLeave($event, c.name); else if (c.type === 'container' && !c.folder) handleDragLeave($event, null)"
              @drop="if(c.type === 'folder') handleDrop($event, c.name); else if (c.type === 'container' && !c.folder) handleDrop($event, null)"
            >
              <!-- Folder Cell -->
              <template x-if="c.type === 'folder'">
                <td colspan="5" class="folder-cell">
                  <div class="folder-title" style="display: flex; align-items: center; width: 100%;">
                    
                    <!-- Folder Info -->
                    <div style="display: flex; align-items: center; width: 220px; flex-shrink: 0; margin-right: 16px; overflow: hidden; white-space: nowrap;">
                      <span class="folder-icon cursor-pointer hover-glow" style="flex-shrink: 0;" @click.stop="openContextMenu($event, c)" x-text="isFolderExpanded(c.name) ? '📂' : '📁'"></span>
                      <div style="display: flex; flex-direction: column; line-height: 1.2; margin: 0 6px; overflow: hidden;">
                        <span style="font-weight: 500; font-size: 14px; overflow: hidden; text-overflow: ellipsis;" x-text="c.name"></span>
                        <span style="font-size: 10px; display: flex; align-items: center; gap: 3px; color: var(--green);">
                          <span>▶</span>
                          <span x-text="`${c.containers ? c.containers.filter(cnt => cnt.status === 'running').length : 0}/${c.count} started`"></span>
                        </span>
                      </div>
                    </div>

                    <!-- Expand/Collapse Arrow -->
                    <button class="btn btn-icon btn-ghost" @click.stop="toggleFolder(c.name)" style="margin-right: 16px; flex-shrink: 0; border: 1px solid var(--border);" title="Ordner auf/zu klappen">
                      <span class="material-icons-round" x-text="isFolderExpanded(c.name) ? 'expand_less' : 'expand_more'"></span>
                    </button>
                    
                    <!-- Preview Containers -->
                    <div class="folder-preview" x-show="!isFolderExpanded(c.name) && c.containers && c.containers.length > 0" 
                         style="flex: 1; overflow: hidden; white-space: nowrap; height: 38px; line-height: 38px;">
                      <template x-for="preview in c.containers" :key="preview.id">
                        <div style="display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); max-width: 140px; margin-right: 16px; vertical-align: middle; height: 100%;">
                          <template x-if="preview.icon">
            <img :src="preview.icon" class="cursor-pointer hover-glow" @click.stop="openContextMenu($event, preview)" style="width: 16px; height: 16px; border-radius: 4px; flex-shrink: 0;" />
          </template>
          <template x-if="!preview.icon">
            <span class="cursor-pointer hover-glow" @click.stop="openContextMenu($event, preview)" style="font-size: 16px; line-height: 1; flex-shrink: 0;" x-text="preview.iconFallback || '📦'"></span>
          </template>
                          <div style="display: flex; flex-direction: column; line-height: 1.1; overflow: hidden; white-space: nowrap; justify-content: center;">
                            <span x-text="preview.name" :style="`color: ${preview.upToDate === false ? 'var(--accent)' : 'var(--text-primary)'}; font-weight: 500; overflow: hidden; text-overflow: ellipsis; display: block;`"></span>
                            <span style="font-size: 10px; display: flex; align-items: center; gap: 3px;" :style="`color: ${preview.status === 'running' ? 'var(--green)' : 'var(--red)'}`">
                              <span x-text="preview.status === 'running' ? '▶' : '■'"></span>
                              <span x-text="preview.status === 'running' ? 'Started' : 'Stopped'"></span>
                            </span>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </td>
              </template>

              <!-- Empty Autostart cell for Folder -->
              <template x-if="c.type === 'folder'">
                <td class="col-adv" style="padding: 0 16px 0 16px; vertical-align: middle; width: 1%; white-space: nowrap; text-align: right;">
                  <span style="visibility: hidden; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;" x-text="$store.i18n.t('col.autostart')">Autostart</span>
                </td>
              </template>

              <!-- CPU/RAM cell for Folder -->
              <template x-if="c.type === 'folder'">
                <td class="col-adv" x-show="advancedView" style="padding: 0 16px 0 0; vertical-align: middle; width: 1%; white-space: nowrap;">
                  <div x-show="!isFolderExpanded(c.name) && c.containers && c.containers.length > 0" style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end; border-left: 1px solid var(--border); padding-left: 16px;">
                    <div style="display: flex; align-items: center; justify-content: flex-start; gap: 8px; line-height: 1;">
                      <span style="color: var(--text-muted); text-transform: uppercase; font-size: 10px; width: 25px; display: inline-block;">CPU</span>
                      <div style="width: 60px; height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border);">
                        <div :style="`width:${c.containers.some(cnt => cnt.status === 'running') ? Math.min(100, c.containers.reduce((sum, cnt) => sum + (cnt.cpu || 0), 0)) : 0}%; background:var(--cyan); height:100%; transition: width 0.3s ease;`"></div>
                      </div>
                      <span style="color: var(--text-primary); font-weight: 500; font-size: 12px; text-align: left; width: 50px; display: inline-block;" x-text="c.containers.some(cnt => cnt.status === 'running') ? `${c.containers.reduce((sum, cnt) => sum + (cnt.cpu || 0), 0).toFixed(1)}%` : '0.0%'"></span>
                    </div>

                    <div style="display: flex; align-items: center; justify-content: flex-start; gap: 8px; line-height: 1;">
                      <span style="color: var(--text-muted); text-transform: uppercase; font-size: 10px; width: 25px; display: inline-block;">RAM</span>
                      <div style="width: 60px; height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border);">
                        <div :style="`width:${c.containers.some(cnt => cnt.status === 'running') ? Math.min(100, (c.containers.reduce((sum, cnt) => sum + (cnt.ram || 0), 0) / (c.containers.length * 4096)) * 100) : 0}%; background:var(--purple); height:100%; transition: width 0.3s ease;`"></div>
                      </div>
                      <span style="color: var(--text-primary); font-weight: 500; font-size: 12px; text-align: left; width: 50px; display: inline-block;" x-text="c.containers.some(cnt => cnt.status === 'running') ? `${Math.floor(c.containers.reduce((sum, cnt) => sum + (cnt.ram || 0), 0))} MB` : '0 MB'"></span>
                    </div>
                  </div>
                </td>
              </template>

              <!-- Uptime cell for Folder -->
              <template x-if="c.type === 'folder'">
                <td class="col-adv" x-show="advancedView" style="padding: 0 16px 0 0; vertical-align: middle; width: 1%; white-space: nowrap;">
                  <div x-show="!isFolderExpanded(c.name) && c.containers && c.containers.length > 0" style="display: flex; justify-content: flex-end; align-items: center; gap: 8px; white-space: nowrap; border-left: 1px solid var(--border); padding-left: 16px;">
                    <span style="color: var(--text-muted); text-transform: uppercase; font-size: 10px;">Uptime</span>
                    <span style="color: var(--text-primary); font-weight: 500; font-size: 12px; display: inline-block; width: 45px; text-align: right;" x-text="c.containers.some(cnt => cnt.status === 'running') ? '5 days' : '—'"></span>
                  </div>
                </td>
              </template>

              <!-- Sub-header for Expanded Folders -->
              <template x-if="c.type === 'folder_header'">
                <!-- We use tds instead of ths to avoid layout weirdness, but style them like headers -->
                <td class="col-bulk" style="width: 40px; text-align: center; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; padding-top: 12px; padding-bottom: 12px;">
                  <input type="checkbox" style="cursor: pointer" :checked="isAllSelectedInFolder(c.name)" @change="toggleSelectAllInFolder(c.name)" aria-label="Alle im Ordner auswählen" />
                </td>
              </template>
              <template x-if="c.type === 'folder_header'">
                <td class="col-icon" style="width: 48px; border-bottom: 1px solid var(--border);"></td>
              </template>
              <template x-if="c.type === 'folder_header'">
                <td class="col-name" style="border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; padding-top: 12px; padding-bottom: 12px;">
                  <span x-text="$store.i18n.t('col.name')">Name</span>
                </td>
              </template>

              <template x-if="c.type === 'folder_header'">
                <td class="col-ports" style="border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; padding-top: 12px; padding-bottom: 12px;" x-text="$store.i18n.t('col.ports')">Ports</td>
              </template>
              <template x-if="c.type === 'folder_header'">
                <td class="col-paths" style="border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; padding-top: 12px; padding-bottom: 12px;" x-text="$store.i18n.t('col.paths')">Pfade</td>
              </template>
              <template x-if="c.type === 'folder_header'">
                <td class="col-adv" style="width: 1%; text-align: right; padding-right: 16px; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; padding-top: 12px; padding-bottom: 12px; white-space: nowrap;" x-text="$store.i18n.t('col.autostart')">Autostart</td>
              </template>
              <template x-if="c.type === 'folder_header'">
                <td class="col-adv" x-show="advancedView" style="width: 1%; text-align: center; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; padding-top: 12px; padding-bottom: 12px; white-space: nowrap;" x-text="$store.i18n.t('col.cpu_ram')">CPU / RAM</td>
              </template>
              <template x-if="c.type === 'folder_header'">
                <td class="col-adv" x-show="advancedView" style="width: 1%; text-align: center; border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; padding-top: 12px; padding-bottom: 12px; white-space: nowrap;" x-text="$store.i18n.t('col.uptime')">Uptime</td>
              </template>

              <!-- Container Cells -->
              <template x-if="c.type === 'container'">
                <td style="text-align: center" :style="`box-shadow: inset 4px 0 0 0 ${c.status === 'running' ? 'var(--green)' : 'var(--red)'};`">
                  <input
                    type="checkbox"
                    style="cursor: pointer"
                    :value="c.id"
                    x-model="selected"
                    aria-label="Container auswählen"
                  />
                </td>
              </template>
              
              <template x-if="c.type === 'container'">
                <td>
                  <div style="position: relative; display: inline-block;">
                    <template x-if="c.icon">
                      <div class="container-icon-wrap cursor-pointer hover-glow" :style="c.upToDate === false ? 'border: 2px solid var(--accent);' : ''" @click.prevent="openContextMenu($event, c)">
                        <img
                          :src="c.icon"
                          :alt="c.name"
                          onerror="
                            this.parentElement.className = 'container-icon-fallback cursor-pointer hover-glow';
                            this.parentElement.innerHTML = 'x';
                          "
                        />
                      </div>
                    </template>
                    <template x-if="!c.icon">
                      <div class="container-icon-fallback cursor-pointer hover-glow" :style="c.upToDate === false ? 'border: 2px solid var(--accent);' : ''" @click.prevent="openContextMenu($event, c)" x-text="c.iconFallback"></div>
                    </template>
                    <template x-if="c.upToDate === false">
                      <div style="position: absolute; top: -8px; right: -8px; background: var(--accent); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; z-index: 10; border: 2px solid var(--bg-surface); box-sizing: content-box;">
                        <span class="material-icons-round" style="font-size: 18px; color: black; font-weight: bold;">update</span>
                      </div>
                    </template>
                  </div>
                </td>
              </template>
              
              <template x-if="c.type === 'container'">
                <td>
                  <div class="container-name" :style="c.upToDate === false ? 'color: var(--accent)' : ''" x-text="c.name"></div>
                  <div class="container-image" x-text="c.image"></div>
                </td>
              </template>
              
              <template x-if="c.type === 'container'">
                <td>
                  <div class="port-list">
                    <template x-for="p in c.ports">
                      <div class="port-item">
                        <span class="port-host" x-text="p.host"></span>
                        <span class="port-arrow">↔</span>
                        <span x-text="p.container"></span>
                        <span style="color: var(--text-muted)" x-text="` (${p.proto})`"></span>
                      </div>
                    </template>
                  </div>
                </td>
              </template>
              
              <template x-if="c.type === 'container'">
                <td>
                  <div class="path-list">
                    <template x-for="p in c.paths.slice(0, 3)">
                      <div class="path-item" :title="`${p.host} → ${p.container}`">
                        <span x-text="p.host"></span> <span class="path-arrow">→</span>
                        <span x-text="p.container"></span>
                      </div>
                    </template>
                    <template x-if="c.paths.length > 3">
                      <div
                        class="path-item"
                        style="color: var(--accent)"
                        x-text="`+${c.paths.length - 3} weitere`"
                      ></div>
                    </template>
                  </div>
                </td>
              </template>

              <template x-if="c.type === 'container'">
                <td
                  class="col-adv"
                  style="padding: 0 16px 0 16px; vertical-align: middle; width: 1%; white-space: nowrap;"
                >
                  <div style="display: flex; justify-content: flex-end;">
                    <label class="action-toggle" style="margin: 0" title="Autostart">
                      <input type="checkbox" :checked="c.id==='nginx01' || c.id==='portainer01'" />
                      <div class="toggle-track">
                        <div class="toggle-thumb"></div>
                      </div>
                    </label>
                  </div>
                </td>
              </template>

              <template x-if="c.type === 'container'">
                <td
                  class="col-adv"
                  x-show="advancedView"
                  style="padding: 0 16px 0 0; vertical-align: middle; width: 1%; white-space: nowrap;"
                >
                  <div style="display: flex; flex-direction: column; gap: 4px; align-items: flex-end; border-left: 1px solid var(--border); padding-left: 16px;">
                    <div style="display: flex; align-items: center; justify-content: flex-start; gap: 8px; line-height: 1;">
                      <span style="color: var(--text-muted); text-transform: uppercase; font-size: 10px; width: 25px; display: inline-block;">CPU</span>
                      <div style="width: 60px; height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border);">
                        <div :style="`width:${c.status === 'running' ? Math.min(100, c.cpu) : 0}%; background:var(--cyan); height:100%; transition: width 0.3s ease;`"></div>
                      </div>
                      <span style="color: var(--text-primary); font-weight: 500; font-size: 12px; text-align: left; width: 50px; display: inline-block;" x-text="c.status === 'running' ? `${c.cpu.toFixed(1)}%` : '0.0%'"></span>
                    </div>

                    <div style="display: flex; align-items: center; justify-content: flex-start; gap: 8px; line-height: 1;">
                      <span style="color: var(--text-muted); text-transform: uppercase; font-size: 10px; width: 25px; display: inline-block;">RAM</span>
                      <div style="width: 60px; height: 6px; background: var(--bg-surface); border-radius: 3px; overflow: hidden; flex-shrink: 0; border: 1px solid var(--border);">
                        <div :style="`width:${c.status === 'running' ? Math.min(100, (c.ram / 4096) * 100) : 0}%; background:var(--purple); height:100%; transition: width 0.3s ease;`"></div>
                      </div>
                      <span style="color: var(--text-primary); font-weight: 500; font-size: 12px; text-align: left; width: 50px; display: inline-block;" x-text="c.status === 'running' ? `${Math.floor(c.ram)} MB` : '0 MB'"></span>
                    </div>
                  </div>
                </td>
              </template>
              
              <template x-if="c.type === 'container'">
                <td
                  class="col-adv"
                  x-show="advancedView"
                  style="padding: 0 16px 0 0; vertical-align: middle; width: 1%; white-space: nowrap;"
                >
                  <div style="display: flex; justify-content: flex-end; align-items: center; gap: 8px; white-space: nowrap; border-left: 1px solid var(--border); padding-left: 16px;">
                    <span style="color: var(--text-muted); text-transform: uppercase; font-size: 10px;">Uptime</span>
                    <span style="color: var(--text-primary); font-weight: 500; font-size: 12px; display: inline-block; width: 45px; text-align: right;" x-text="c.status === 'running' ? '5 days' : '—'"></span>
                  </div>
                </td>
              </template>

            </tr>
          </template>
        </template>
      </tbody>
    </table>
  </div>

  <!-- Bulk Action Bar -->
  <template x-teleport="body">
    <div class="bulk-action-bar" :class="selected.length > 0 ? 'active' : ''">
      <div
        style="
          display: flex;
          align-items: center;
          gap: 8px;
          color: var(--text-primary);
          font-weight: 600;
        "
      >
        <span class="material-icons-round" style="color: var(--accent)">check_circle</span>
        <span x-text="`${selected.length} ausgewählt`"></span>
      </div>
      <div style="width: 1px; height: 24px; background: var(--border)"></div>
      <div style="display: flex; gap: 8px">
        <button class="btn btn-primary" @click="bulkAction('start')">
          <span class="material-icons-round">play_arrow</span> Starten
        </button>
        <button class="btn btn-ghost" @click="bulkAction('stop')">
          <span class="material-icons-round">stop</span> Stoppen
        </button>
        <button class="btn btn-danger" @click="bulkAction('delete')" style="margin-left: 8px">
          <span class="material-icons-round">delete</span> Löschen
        </button>
      </div>
    </div>
  </template>

  <!-- Docker Context Menu -->
  <template x-teleport="body">
    <div
      id="docker-ctx-menu"
      class="docker-context-menu"
      x-show="contextMenu.open"
      @click.away="closeContextMenu()"
      x-transition.opacity.duration.150ms
      :style="`top: ${contextMenu.y}px; left: ${contextMenu.x}px;`"
      style="display: none;"
    >
      <!-- Folder Actions -->
      <template x-if="contextMenu.container?.type === 'folder'">
        <div>
          <div class="ctx-item" @click="editFolder(contextMenu.container?.name); closeContextMenu()"><span class="material-icons-round">edit</span> Bearbeiten</div>
          <div class="ctx-item" style="color: var(--danger)" @click="deleteFolder(contextMenu.container?.name); closeContextMenu()"><span class="material-icons-round">delete</span> Löschen</div>
        </div>
      </template>

      <!-- Container Actions -->
      <template x-if="contextMenu.container?.type !== 'folder'">
        <div>
          <template x-if="!contextMenu.container?.gsData">
            <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">public</span> WebUI</div>
          </template>
          <div class="ctx-item" @click="typeof openTerminal === 'function' ? openTerminal(contextMenu.container?.id) : null; closeContextMenu()"><span class="material-icons-round">terminal</span> Console</div>
          <template x-if="contextMenu.container?.upToDate === false">
            <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">cloud_download</span> Update</div>
          </template>
          <div class="ctx-divider"></div>
          <template x-if="contextMenu.container?.status === 'running'">
            <div class="ctx-item" @click="toggleContainer(contextMenu.container?.id); closeContextMenu()"><span class="material-icons-round">stop</span> Stop</div>
          </template>
          <template x-if="contextMenu.container?.status !== 'running'">
            <div class="ctx-item" @click="toggleContainer(contextMenu.container?.id); closeContextMenu()"><span class="material-icons-round">play_arrow</span> Start</div>
          </template>
          <template x-if="contextMenu.container?.status === 'running'">
            <div>
              <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">pause</span> Pause</div>
              <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">restart_alt</span> Restart</div>
            </div>
          </template>
          <div class="ctx-divider"></div>
          <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">notes</span> Logs</div>
          <div class="ctx-item" @click="$dispatch('open-config-modal', {id: contextMenu.container?.id, name: contextMenu.container?.name}); closeContextMenu()"><span class="material-icons-round">build</span> Edit</div>
          <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">delete</span> Remove</div>
          <div class="ctx-divider"></div>
          <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">explore</span> Project Page</div>
          <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">help</span> Support</div>
          <div class="ctx-item" @click="closeContextMenu()"><span class="material-icons-round">info</span> More Info</div>
        </div>
      </template>
    </div>
  </template>
</section>
